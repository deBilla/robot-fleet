version: "3.9"

# Playground stack: robot simulator + inference + ROS2 bridge
# Connects to the platform stack via shared Docker network.
#
# Usage:
#   1. Start platform first:  cd ../platform && docker compose up -d
#   2. Start playground:      docker compose up -d
#
# Or run standalone (simulator streams to a local gRPC target):
#   GRPC_TARGET=host.docker.internal:50051 docker compose up simulator

services:
  simulator:
    build:
      context: .
      dockerfile: deploy/Dockerfile.simulator
    ports:
      - "8085:8085"
    environment:
      ROBOT_ID: "robot-0001"
      GRPC_TARGET: "ingestion:50051"
      REDIS_ADDR: "redis:6379"
      SIM_STEP_HZ: "50"
      TELEMETRY_HZ: "10"
      FRAME_PORT: "8085"
    depends_on:
      - inference
    networks:
      - fleetos-net
    restart: unless-stopped

  inference:
    build:
      context: .
      dockerfile: deploy/Dockerfile.inference
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8081/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - fleetos-net
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "5173:5173"
    networks:
      - fleetos-net
    restart: unless-stopped

  ros2-bridge:
    build:
      context: ./ros2_bridge
      dockerfile: Dockerfile
    environment:
      ROS_DOMAIN_ID: "0"
    networks:
      - fleetos-net
    restart: unless-stopped

networks:
  fleetos-net:
    external: true
    name: platform_default
