version: "3.9"

# Playground stack: robot simulator (like a real robot fleet)
# Connects to the platform stack via shared Docker network.
# The robot only sends telemetry (gRPC) and receives commands (gRPC).
# All reasoning (inference, model management) happens in the platform.
#
# Usage:
#   1. Start platform first:  cd ../platform && docker compose up -d
#   2. Start playground:      docker compose up -d
#
# Or run standalone (simulator streams to a local gRPC target):
#   GRPC_TARGET=host.docker.internal:50051 docker compose up simulator

services:
  simulator:
    build:
      context: .
      dockerfile: deploy/Dockerfile.simulator
    ports:
      - "8085:8085"
    environment:
      ROBOT_ID: "robot-0001"
      GRPC_TARGET: "ingestion:50051"
      SIM_STEP_HZ: "50"
      TELEMETRY_HZ: "10"
      FRAME_PORT: "8085"
      S3_ENDPOINT: "minio:9000"
      S3_BUCKET: "fleetos-models"
      S3_ACCESS_KEY: "fleetos"
      S3_SECRET_KEY: "fleetos123"
    networks:
      - fleetos-net
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    ports:
      - "5173:5173"
    networks:
      - fleetos-net
    restart: unless-stopped

  ros2-bridge:
    build:
      context: ./ros2_bridge
      dockerfile: Dockerfile
    environment:
      ROS_DOMAIN_ID: "0"
    networks:
      - fleetos-net
    restart: unless-stopped

networks:
  fleetos-net:
    external: true
    name: platform_default
