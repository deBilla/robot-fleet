name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fleetos
          POSTGRES_PASSWORD: fleetos
          POSTGRES_DB: fleetos
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Run migrations
        run: |
          for f in migrations/*.sql; do
            psql "$POSTGRES_DSN" -f "$f"
          done
        env:
          POSTGRES_DSN: postgres://fleetos:fleetos@localhost:5432/fleetos?sslmode=disable
      - name: Run tests
        env:
          POSTGRES_DSN: postgres://fleetos:fleetos@localhost:5432/fleetos?sslmode=disable
          REDIS_ADDR: localhost:6379
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: platform/coverage.out

  docker-build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, ingestion, processor, worker, inference]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f platform/deploy/docker/Dockerfile.${{ matrix.service }} -t fleetos/${{ matrix.service }}:ci .
