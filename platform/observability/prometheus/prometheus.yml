global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "fleetos-api"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: "fleetos-ingestion"
    static_configs:
      - targets: ["ingestion:9090"]

  - job_name: "fleetos-inference"
    static_configs:
      - targets: ["inference:8081"]
    metrics_path: /metrics

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse:8123"]
    metrics_path: /metrics

  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: /minio/v2/metrics/cluster

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
