apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-secret
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  # Base64 encoded — in production, use sealed-secrets or external-secrets-operator
  POSTGRES_DSN: {{ printf "postgres://%s:%s@%s-postgresql:5432/%s?sslmode=require" .Values.postgresql.auth.username .Values.postgresql.auth.password .Release.Name .Values.postgresql.auth.database | b64enc }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth-secret
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.api.jwtSecret | default "change-me-in-production" | b64enc }}
