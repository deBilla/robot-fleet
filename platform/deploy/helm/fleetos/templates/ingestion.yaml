apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion
  labels:
    app: fleetos-ingestion
    app.kubernetes.io/name: ingestion
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.ingestion.replicaCount }}
  selector:
    matchLabels:
      app: fleetos-ingestion
  template:
    metadata:
      labels:
        app: fleetos-ingestion
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: fleetos-ingestion
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - fleetos-ingestion
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: ingestion
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          image: "{{ .Values.ingestion.image.repository }}:{{ .Values.ingestion.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: KAFKA_BROKERS
              value: "{{ .Release.Name }}-kafka:9092"
            - name: KAFKA_TELEMETRY_TOPIC
              value: "robot.telemetry"
            - name: ENVIRONMENT
              value: {{ .Values.global.environment }}
          resources:
            {{- toYaml .Values.ingestion.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingestion
spec:
  type: {{ .Values.ingestion.service.type }}
  ports:
    - port: {{ .Values.ingestion.service.port }}
      targetPort: grpc
      name: grpc
  selector:
    app: fleetos-ingestion
{{- if .Values.ingestion.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-ingestion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-ingestion
  minReplicas: {{ .Values.ingestion.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.ingestion.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.ingestion.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
