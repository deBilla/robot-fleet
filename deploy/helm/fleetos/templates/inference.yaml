apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-inference
  labels:
    app: fleetos-inference
    app.kubernetes.io/name: inference
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.inference.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: fleetos-inference
  template:
    metadata:
      labels:
        app: fleetos-inference
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
    spec:
      nodeSelector:
        workload: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        fsGroup: 65534
      containers:
        - name: inference
          securityContext:
            allowPrivilegeEscalation: false
          image: "{{ .Values.inference.image.repository }}:{{ .Values.inference.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8081
              name: http
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "8Gi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-inference
  labels:
    app: fleetos-inference
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: fleetos-inference
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Release.Name }}-inference
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Release.Name }}-inference
  minReplicas: {{ .Values.inference.autoscaling.minReplicas | default 1 }}
  maxReplicas: {{ .Values.inference.autoscaling.maxReplicas | default 5 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
