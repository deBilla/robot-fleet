global:
  environment: dev
  imageRegistry: ""
  imagePullPolicy: IfNotPresent

# --- Ingestion Service ---
ingestion:
  replicaCount: 2
  image:
    repository: fleetos/ingestion
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 50051
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# --- API Service ---
api:
  replicaCount: 3
  image:
    repository: fleetos/api
    tag: latest
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 1Gi
  service:
    type: ClusterIP
    port: 8080
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
  ingress:
    enabled: true
    className: nginx
    host: api.fleetos.dev
    tls: true

# --- Simulator ---
simulator:
  enabled: true
  replicaCount: 1
  image:
    repository: fleetos/simulator
    tag: latest
  robotCount: 10
  tickIntervalMs: 100
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# --- Kafka ---
kafka:
  replicaCount: 3
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: 500m
      memory: 1Gi

# --- PostgreSQL ---
postgresql:
  auth:
    username: fleetos
    password: fleetos
    database: fleetos
  primary:
    persistence:
      size: 20Gi
  readReplicas:
    replicaCount: 2

# --- Redis ---
redis:
  architecture: replication
  auth:
    enabled: false
  sentinel:
    enabled: true
  master:
    persistence:
      size: 5Gi

# --- Observability ---
prometheus:
  enabled: true
  server:
    retention: 30d
    persistentVolume:
      size: 50Gi

grafana:
  enabled: true
  adminPassword: admin
  persistence:
    enabled: true
    size: 5Gi

# --- Inference Service (GPU) ---
inference:
  replicaCount: 1
  image:
    repository: fleetos/inference
    tag: latest
  autoscaling:
    minReplicas: 1
    maxReplicas: 5

# --- Istio Service Mesh ---
istio:
  enabled: false
  mtls:
    mode: STRICT
  virtualService:
    canary:
      weight: 0  # 0-100 for canary traffic splitting

# --- MinIO (S3-compatible) ---
minio:
  enabled: true
  persistence:
    size: 100Gi
  buckets:
    - name: fleetos-telemetry
    - name: fleetos-models
    - name: fleetos-training-data
